rules:
  - group: Fingerprint
    rule:
      - name: Shiro
        loaded: true
        f_regex: (=deleteMe|rememberMe=)
        s_regex: ''
        format: '{0}'
        color: green
        scope: any header
        engine: dfa
        sensitive: true
      - name: JSON Web Token
        loaded: true
        f_regex: (eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9._-]{10,}|eyJ[A-Za-z0-9_\/+-]{10,}\.[A-Za-z0-9._\/+-]{10,})
        s_regex: ''
        format: '{0}'
        color: green
        scope: any
        engine: nfa
        sensitive: true
      - name: Swagger UI
        loaded: true
        f_regex: ((swagger-ui.html)|(\"swagger\":)|(Swagger UI)|(swaggerUi)|(swaggerVersion))
        s_regex: ''
        format: '{0}'
        color: red
        scope: response body
        engine: dfa
        sensitive: false
      - name: Ueditor
        loaded: true
        f_regex: (ueditor\.(config|all)\.js)
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: dfa
        sensitive: false
      - name: Druid
        loaded: true
        f_regex: (Druid Stat Index)
        s_regex: ''
        format: '{0}'
        color: orange
        scope: response body
        engine: dfa
        sensitive: false
      - name: PDF.js Viewer
        loaded: true
        f_regex: (pdf.worker)
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: dfa
        sensitive: false
      - name: Vite DevMode
        loaded: true
        f_regex: (/\@vite/client)
        s_regex: ''
        format: '{0}'
        color: red
        scope: response body
        engine: dfa
        sensitive: true
  - group: Maybe Vulnerability
    rule:
      - name: Java Deserialization
        loaded: true
        f_regex: (javax\.faces\.ViewState)
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: dfa
        sensitive: false
      - name: Debug Logic Parameters
        loaded: true
        f_regex: ((access=)|(adm=)|(admin=)|(alter=)|(cfg=)|(clone=)|(config=)|(create=)|(dbg=)|(debug=)|(delete=)|(disable=)|(edit=)|(enable=)|(exec=)|(execute=)|(grant=)|(load=)|(make=)|(modify=)|(rename=)|(reset=)|(root=)|(shell=)|(test=)|(toggl=))
        s_regex: ''
        format: '{0}'
        color: cyan
        scope: request
        engine: dfa
        sensitive: false
      - name: URL As A Value
        loaded: true
        f_regex: (=(https?)(://|%3a%2f%2f))
        s_regex: ''
        format: '{0}'
        color: cyan
        scope: any
        engine: nfa
        sensitive: false
      - name: Upload Form
        loaded: true
        f_regex: (type\=\"file\")
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: dfa
        sensitive: false
      - name: DoS Paramters
        loaded: true
        f_regex: ((size=)|(page=)|(num=)|(limit=)|(start=)|(end=)|(count=))
        s_regex: ''
        format: '{0}'
        color: cyan
        scope: request
        engine: dfa
        sensitive: false
      - name: Passwd File
        loaded: true
        f_regex: (/root:/bin/bash)
        s_regex: ''
        format: '{0}'
        color: red
        scope: response body
        engine: dfa
        sensitive: true
      - name: Win.ini File
        loaded: true
        f_regex: (for 16-bit app)
        s_regex: ''
        format: '{0}'
        color: red
        scope: response body
        engine: dfa
        sensitive: true
  - group: Basic Information
    rule:
      - name: Email
        loaded: true
        f_regex: '([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,5})'
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response
        engine: nfa
        sensitive: false
      - name: Chinese IDCard
        loaded: true
        f_regex: '([1-9]\d{5}(18|19|20)\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\d{3}[\dXx])'
        s_regex: ''
        format: '{0}'
        color: orange
        scope: response body
        engine: nfa
        sensitive: true
      - name: Chinese Mobile Number
        loaded: true
        f_regex: '(1[3-9]\d{9})'
        s_regex: ''
        format: '{0}'
        color: orange
        scope: response body
        engine: nfa
        sensitive: false
      - name: Internal IP Address
        loaded: true
        f_regex: '((127\.0\.0\.1)|(10\.\d{1,3}\.\d{1,3}\.\d{1,3})|(172\.((1[6-9])|(2\d)|(3[01]))\.\d{1,3}\.\d{1,3})|(192\.168\.\d{1,3}\.\d{1,3}))'
        s_regex: ''
        format: '{0}'
        color: cyan
        scope: response
        engine: nfa
        sensitive: true
      - name: MAC Address
        loaded: true
        f_regex: '([a-fA-F0-9]{2}(:[a-fA-F0-9]{2}){5})'
        s_regex: ''
        format: '{0}'
        color: green
        scope: response
        engine: nfa
        sensitive: true
      - name: Bank Card Number
        loaded: false
        f_regex: '(([3-6]\d{15,18})(?!\d))'
        s_regex: ''
        format: '{0}'
        color: orange
        scope: response body
        engine: nfa
        sensitive: true
      - name: Social Credit Code
        loaded: false
        f_regex: '([0-9A-HJ-NPQRTUWXY]{2}\d{6}[0-9A-HJ-NPQRTUWXY]{10})'
        s_regex: ''
        format: '{0}'
        color: orange
        scope: response body
        engine: nfa
        sensitive: true
  - group: Sensitive Information
    rule:
      - name: Cloud Key
        loaded: true
        f_regex: (((access)(|-|_)(key)(|-|_)(id|secret))|(LTAI[a-z0-9]{12,20}))
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: any
        engine: nfa
        sensitive: false
      - name: Windows File/Dir Path
        loaded: true
        f_regex: '([a-zA-Z]:\\\\?(?:[^<>:/\\|?*]+\\\\?)*[^<>:/\\|?*]+(?:\.[^<>:/\\|?*]+)?)'
        s_regex: ''
        format: '{0}'
        color: green
        scope: response
        engine: nfa
        sensitive: true
      - name: Password Field
        loaded: true
        f_regex: (((|\\)(|'|")(|[\.\w]{1,32})([p](ass|wd|asswd|assword))(|[\.\w]{1,32})(|\\)(|'|")(
          |)(:|[=]{1,3}|![=]{1,2}|[\)]{0,1}\.val\()( |)(|\\)('|")([^'"]+?)(|\\)('|")(|,|\)))|((|\\)('|")([^'"]+?)(|\\)('|")(|\\)(|'|")(
          |)(:|[=]{1,3}|![=]{1,2})( |)(|[\.\w]{1,32})([p](ass|wd|asswd|assword))(|[\.\w]{1,32})(|\\)(|'|")))
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: nfa
        sensitive: false
      - name: Username Field
        loaded: true
        f_regex: (((|\\)(|'|")(|[\.\w]{1,32})(([u](ser|name|sername))|(account)|((((create|update)((d|r)|(by|on|at)))|(creator))))(|[\.\w]{1,32})(|\\)(|'|")(
          |)(:|[=]{1,3}|![=]{1,2}|[\)]{0,1}\.val\()( |)(|\\)('|")([^'"]+?)(|\\)('|")(|,|\)))|((|\\)('|")([^'"]+?)(|\\)('|")(|\\)(|'|")(
          |)(:|[=]{1,3}|![=]{1,2})( |)(|[\.\w]{1,32})(([u](ser|name|sername))|(account)|((((create|update)((d|r)|(by|on|at)))|(creator))))(|[\.\w]{1,32})(|\\)(|'|")))
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: nfa
        sensitive: false
      - name: WeCom Key
        loaded: true
        f_regex: ((corp)(id|secret))
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: dfa
        sensitive: false
      - name: JDBC Connection
        loaded: true
        f_regex: (jdbc:[a-z:]+://[a-z0-9\.\-_:;=/@?,&]+)
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: any
        engine: nfa
        sensitive: false
      - name: Authorization Header
        loaded: true
        f_regex: ((basic [a-z0-9=:_\+\/-]{5,100})|(bearer [a-z0-9_.=:_\+\/-]{5,100}))
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: nfa
        sensitive: false
      - name: Sensitive Field
        loaded: true
        f_regex: (((|\\)(|'|")(|[\.\w]{1,32})(key|secret|token|config|auth|access|admin|ticket)(|[\.\w]{1,32})(|\\)(|'|")(
          |)(:|[=]{1,3}|![=]{1,2}|[\)]{0,1}\.val\()( |)(|\\)('|")([^'"]+?)(|\\)('|")(|,|\)))|((|\\)('|")([^'"]+?)(|\\)('|")(|\\)(|'|")(
          |)(:|[=]{1,3}|![=]{1,2})( |)(|[\.\w]{1,32})(key|secret|token|config|auth|access|admin|ticket)(|[\.\w]{1,32})(|\\)(|'|")))
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response
        engine: nfa
        sensitive: false
      - name: Mobile Number Field
        loaded: true
        f_regex: (((|\\)(|'|")(|[\.\w]{1,32})(mobile|phone|sjh|shoujihao|concat)(|[\.\w]{1,32})(|\\)(|'|")(
          |)(:|[=]{1,3}|![=]{1,2}|[\)]{0,1}\.val\()( |)(|\\)('|")([^'"]+?)(|\\)('|")(|,|\)))|((|\\)('|")([^'"]+?)(|\\)('|")(|\\)(|'|")(
          |)(:|[=]{1,3}|![=]{1,2})( |)(|[\.\w]{1,32})(mobile|phone|sjh|shoujihao|concat)(|[\.\w]{1,32})(|\\)(|'|")))
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: nfa
        sensitive: false
      - name: Userinfo In Link
        loaded: true
        f_regex: (?:"|'|\`)(((?:[a-zA-Z]{1,10}://|//)[^"'/]{1,}\.[a-zA-Z]{2,}[^"']{0,})|((?:/|\.\./|\./)[^"'><,;|*()(%%$^/\\\[\]][^"'><,;|()]{1,})|([a-zA-Z0-9_\-/]{1,}/[a-zA-Z0-9_\-/]{1,}\.(?:[a-zA-Z]{1,4}|action)(?:[\?|#][^"|']{0,}|))|([a-zA-Z0-9_\-/]{1,}/[a-zA-Z0-9_\-/]{3,}(?:[\?|#][^"|']{0,}|))|([a-zA-Z0-9_\-]{1,}\.(?:\w)(?:[\?|#][^"|']{0,}|)))(?:"|'|\`)
        s_regex: ((([p](ass|wd|asswd|assword))|(([u](ser|name|sername))|(account)|((((create|update)((d|r)|(by|on|at)))|(creator)))))=[\.\w]{1,32})
        format: '{0}'
        color: green
        scope: response body
        engine: nfa
        sensitive: false
      - name: User Identity
        loaded: true
        f_regex: (\b(?:(localStorage|sessionStorage)\.(setItem|getItem)|setCookie|Cookies\.set)\s*\(\s*['"](.+?)['"].*?)
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: nfa
        sensitive: false
  - group: Other
    rule:
      - name: Linkfinder
        loaded: true
        f_regex: (?:"|'|\`)(((?:[a-zA-Z]{1,10}://|//)[^"'/]{1,}\.[a-zA-Z]{2,}[^"']{0,})|((?:/|\.\./|\./)[^"'><,;|*()(%%$^/\\\[\]][^"'><,;|()]{1,})|([a-zA-Z0-9_\-/]{1,}/[a-zA-Z0-9_\-/]{1,}\.(?:[a-zA-Z]{1,4}|action)(?:[\?|#][^"|']{0,}|))|([a-zA-Z0-9_\-/]{1,}/[a-zA-Z0-9_\-/]{3,}(?:[\?|#][^"|']{0,}|))|([a-zA-Z0-9_\-]{1,}\.(?:\w)(?:[\?|#][^"|']{0,}|)))(?:"|'|\`)
        s_regex: ''
        format: '{0}'
        color: gray
        scope: response body
        engine: nfa
        sensitive: true
      - name: Source Map
        loaded: true
        f_regex: (\.js\.map)
        s_regex: ''
        format: '{0}'
        color: pink
        scope: response body
        engine: dfa
        sensitive: false
      - name: Create Script
        loaded: true
        f_regex: (\{[^{}]*\}\s*\[[^\s]*\]\s*\+\s*"[^\s]*\.js")
        s_regex: '"?([\w].*?)"?:"(.*?)"'
        format: '{0}.{1}'
        color: green
        scope: response body
        engine: nfa
        sensitive: false
      - name: URL Schemes
        loaded: false
        f_regex: (\b(?![\w]{0,10}?https?://)(([A-Za-z0-9-\.]{1,20})://([-\w+&@#/%?=~_|!:,.;]*[-\w+&@#/%=~_|])?))
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: nfa
        sensitive: false
      - name: Router Push
        loaded: true
        f_regex: (\$router\.push)
        s_regex: ''
        format: '{0}'
        color: magenta
        scope: response body
        engine: dfa
        sensitive: false
      - name: All URL
        loaded: true
        f_regex: (https?://[-A-Za-z0-9+&@#/%?=~_|!:,.;一-鿿]+[-A-Za-z0-9+&@#/%=~_|])
        s_regex: ''
        format: '{0}'
        color: gray
        scope: response body
        engine: nfa
        sensitive: true
      - name: Request URI
        loaded: false
        f_regex: ' ((?!.*\.js(\?.*)?$)(.*?[^.js$])) '
        s_regex: ''
        format: '{0}'
        color: gray
        scope: request line
        engine: nfa
        sensitive: false
      - name: 302 Location
        loaded: true
        f_regex: 'Location: ([^\r\n]*)'
        s_regex: ''
        format: '{0}'
        color: gray
        scope: response header
        engine: nfa
        sensitive: false
      - name: OSKeys
        loaded: true
        f_regex: <Key>(.*?)</Key>
        s_regex: ''
        format: '{0}'
        color: gray
        scope: response body
        engine: nfa
        sensitive: true
  - group: HeapDump Enhanced
    rule:
      - name: RSA Private Key
        loaded: true
        f_regex: (-----BEGIN (RSA )?PRIVATE KEY-----)
        s_regex: ''
        format: '{0}'
        color: red
        scope: response body
        engine: dfa
        sensitive: true
      - name: AWS Access Key
        loaded: true
        f_regex: (AKIA[0-9A-Z]{16})
        s_regex: ''
        format: '{0}'
        color: red
        scope: response body
        engine: nfa
        sensitive: true
      - name: GitHub Token
        loaded: true
        f_regex: (gh[ps]_[A-Za-z0-9_]{36,})
        s_regex: ''
        format: '{0}'
        color: red
        scope: response body
        engine: nfa
        sensitive: true
      - name: Slack Token
        loaded: true
        f_regex: (xox[bpsorta]-[0-9A-Za-z-]+)
        s_regex: ''
        format: '{0}'
        color: red
        scope: response body
        engine: nfa
        sensitive: true
      - name: Private Key Path
        loaded: true
        f_regex: (\.pem|\.key|\.p12|\.pfx|\.jks|\.keystore)
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: dfa
        sensitive: true
      - name: Connection String
        loaded: true
        f_regex: ((mongodb(\+srv)?|redis|amqp|kafka)://[^\s]+)
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: nfa
        sensitive: false
      - name: Internal Domain
        loaded: false
        f_regex: (([a-z0-9-]+\.)+(local|internal|corp|intra|priv))
        s_regex: ''
        format: '{0}'
        color: cyan
        scope: response body
        engine: nfa
        sensitive: true
      - name: Docker Registry
        loaded: true
        f_regex: ((registry\.[a-z]+\.[a-z]+/[a-z]+|[a-z]+\.dkr\.ecr\.[a-z-]+\.amazonaws\.com))
        s_regex: ''
        format: '{0}'
        color: cyan
        scope: response body
        engine: nfa
        sensitive: false
      - name: Name Field
        loaded: true
        f_regex: ((realName|nickName|userName|displayName|fullName|contactName|personName|name|姓名|昵称|用户名|联系人|负责人)["\s]*[:=：]["\s]*['"]?([^'",\r\n]{2,20})['"]?)
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: nfa
        sensitive: false
      - name: Chinese Name
        loaded: true
        f_regex: ([一-鿿]{2,4}(?:先生|女士|老师|经理|主任|总|副总|局长|处长|科长|部长|同志|同学))
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: nfa
        sensitive: false
      - name: Email Field
        loaded: true
        f_regex: ((email|mail|e-mail|邮箱|邮件)["\s]*[:=：]["\s]*['"]?([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,5})['"]?)
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: nfa
        sensitive: false
      - name: Phone Field
        loaded: true
        f_regex: ((phone|mobile|tel|telephone|手机|电话|联系|telphone)["\s]*[:=：]["\s]*['"]?(1[3-9]\d{9})['"]?)
        s_regex: ''
        format: '{0}'
        color: yellow
        scope: response body
        engine: nfa
        sensitive: false
      - name: Address Field
        loaded: true
        f_regex: ((address|addr|地址|住址|住所|居住地|详细地址|家庭住址)["\s]*[:=：]["\s]*['"]?([^'",\r\n]{5,100})['"]?)
        s_regex: ''
        format: '{0}'
        color: green
        scope: response body
        engine: nfa
        sensitive: false
      - name: ID Card Field
        loaded: true
        f_regex: ((idCard|idNo|identity|身份证|证件号|身份证号|idNumber)["\s]*[:=：]["\s]*['"]?(\d{17}[\dXx])['"]?)
        s_regex: ''
        format: '{0}'
        color: orange
        scope: response body
        engine: nfa
        sensitive: false
